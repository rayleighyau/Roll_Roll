<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Roll-Roll</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --felt: #1a3a2a;
    --felt-dark: #0f2419;
    --felt-light: #244d38;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #7a6330;
    --ivory: #f5f0e8;
    --ivory-dim: #a09880;
    --dot: #1a1a1a;
    --dot-one: #cc2222;
    --shadow-deep: rgba(0,0,0,0.7);
    --shadow-gold: rgba(201,168,76,0.3);
    --dice-face: #f5f0e8;
    --dice-size: min(22vw, 22vh, 160px);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    touch-action: none;
  }

  body {
    background: var(--felt-dark);
    font-family: 'Crimson Pro', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    border: 3px solid var(--gold-dim);
    border-radius: 2px;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.5), inset 0 0 20px rgba(201,168,76,0.08);
    pointer-events: none; z-index: 1;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 10px;
    z-index: 10;
    pointer-events: none;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(18px, 4vw, 28px);
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-shadow: 0 2px 12px rgba(201,168,76,0.4);
  }

  .title span { color: var(--gold-light); }

  .toggles {
    display: flex;
    gap: 10px;
    pointer-events: all;
  }

  .toggle-btn {
    width: 36px; height: 36px;
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity 0.25s, transform 0.15s, filter 0.25s;
    filter: grayscale(1);
    -webkit-tap-highlight-color: transparent;
    padding: 0;
  }

  .toggle-btn.active {
    opacity: 1;
    filter: none;
    transform: scale(1.1);
  }

  .toggle-btn:hover { opacity: 0.6; }
  .toggle-btn.active:hover { opacity: 1; }
  .toggle-btn svg { width: 100%; height: 100%; }

  .hint {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: clamp(12px, 2.5vw, 15px);
    color: var(--ivory-dim);
    letter-spacing: 0.1em;
    opacity: 0.6;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
    transition: opacity 0.4s;
  }

  /* ── Stage ── */
  #stage {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 20px;
  }

  /* Triangle layout: use CSS grid with 3 dice */
  #stage.three-dice {
    display: grid;
    grid-template-columns: repeat(2, var(--dice-size));
    grid-template-rows: repeat(2, var(--dice-size));
    gap: 24px;
    /* total grid width = 2*size + gap */
  }

  /* Top die: span 2 cols, centred */
  #stage.three-dice .die-wrap:nth-child(1) {
    grid-column: 1 / 3;
    justify-self: center;
  }
  /* Bottom two side-by-side */
  #stage.three-dice .die-wrap:nth-child(2) {
    grid-column: 1;
    grid-row: 2;
  }
  #stage.three-dice .die-wrap:nth-child(3) {
    grid-column: 2;
    grid-row: 2;
  }

  .die-wrap {
    position: relative;
    width: var(--dice-size);
    height: var(--dice-size);
    perspective: 600px;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .die {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    border-radius: 18%;
    will-change: transform;
  }

  .die.rolling {
    animation: diceRoll 0.13s linear infinite;
  }

  @keyframes diceRoll {
    0%   { transform: rotateX(0deg)   rotateY(0deg)   rotateZ(0deg); }
    16%  { transform: rotateX(90deg)  rotateY(45deg)  rotateZ(15deg); }
    33%  { transform: rotateX(180deg) rotateY(90deg)  rotateZ(30deg); }
    50%  { transform: rotateX(270deg) rotateY(135deg) rotateZ(0deg); }
    66%  { transform: rotateX(360deg) rotateY(200deg) rotateZ(-20deg); }
    83%  { transform: rotateX(90deg)  rotateY(280deg) rotateZ(10deg); }
    100% { transform: rotateX(0deg)   rotateY(360deg) rotateZ(0deg); }
  }

  @keyframes settleIn {
    0%   { transform: rotateX(20deg) rotateY(10deg) scale(1.08); }
    60%  { transform: rotateX(-5deg) rotateY(-5deg) scale(0.97); }
    100% { transform: rotateX(0deg)  rotateY(0deg)  scale(1); }
  }

  .die.settling {
    animation: settleIn 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .die-face {
    position: absolute;
    width: 100%; height: 100%;
    background: var(--dice-face);
    border-radius: 18%;
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 6px 30px var(--shadow-deep),
      0 2px 0 rgba(255,255,255,0.9) inset,
      0 -2px 0 rgba(0,0,0,0.15) inset,
      2px 0 0 rgba(255,255,255,0.6) inset,
      -2px 0 0 rgba(0,0,0,0.1) inset;
    border: 1.5px solid rgba(0,0,0,0.12);
  }

  .die-shadow {
    position: absolute;
    bottom: -12px; left: 8%;
    width: 84%; height: 18px;
    background: rgba(0,0,0,0.35);
    border-radius: 50%;
    filter: blur(8px);
    z-index: -1;
  }

  .die-face svg { width: 78%; height: 78%; }

  /* ── Sum Popup ── */
  #sum-popup {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--felt-dark);
    border: 1.5px solid var(--gold);
    border-radius: 12px;
    padding: 12px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 20px var(--shadow-gold);
    white-space: nowrap;
  }

  #sum-popup.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #sum-popup .sum-label {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  #sum-popup .sum-value {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 36px;
    color: var(--gold-light);
    line-height: 1;
    text-shadow: 0 0 20px var(--shadow-gold);
  }

  .ripple {
    position: fixed;
    border-radius: 50%;
    background: rgba(201,168,76,0.15);
    transform: scale(0);
    pointer-events: none;
    z-index: 3;
    animation: rippleOut 0.5s ease-out forwards;
  }

  @keyframes rippleOut {
    to { transform: scale(4); opacity: 0; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    :root { --dice-size: min(28vh, 120px); }
    .title { font-size: 16px; }
    #sum-popup { bottom: 10px; padding: 8px 24px; }
    #sum-popup .sum-value { font-size: 26px; }
    .hint { bottom: 8px; font-size: 11px; }
  }

  @media (max-width: 400px) {
    :root { --dice-size: min(36vw, 140px); }
  }
</style>
</head>
<body>

<header>
  <div class="title">Roll<span>·</span>Roll</div>
  <div class="toggles">
    <button class="toggle-btn" id="toggle2" aria-label="Add second die" title="Second die">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="7" fill="#c9a84c" stroke="#7a6330" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="4" fill="#1a1a1a"/>
        <circle cx="28" cy="28" r="4" fill="#1a1a1a"/>
      </svg>
    </button>
    <button class="toggle-btn" id="toggle3" aria-label="Add third die" title="Third die">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="36" height="36" rx="7" fill="#c9a84c" stroke="#7a6330" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="3.5" fill="#1a1a1a"/>
        <circle cx="28" cy="12" r="3.5" fill="#1a1a1a"/>
        <circle cx="20" cy="28" r="3.5" fill="#1a1a1a"/>
      </svg>
    </button>
  </div>
</header>

<div id="stage"></div>

<div id="sum-popup">
  <div class="sum-label">Total</div>
  <div class="sum-value" id="sum-value">—</div>
</div>

<div class="hint" id="hint">Tap to roll</div>

<script>
// ── Dot patterns ──
const DOT_PATTERNS = {
  1: [[20,20]],
  2: [[11,11],[29,29]],
  3: [[11,11],[20,20],[29,29]],
  4: [[11,11],[29,11],[11,29],[29,29]],
  5: [[11,11],[29,11],[20,20],[11,29],[29,29]],
  6: [[11,11],[29,11],[11,20],[29,20],[11,29],[29,29]]
};

function makeDotsSVG(n, isOne) {
  const r = 4.4;
  const fill = isOne ? '#cc2222' : '#1a1a1a';
  const dots = DOT_PATTERNS[n].map(([cx,cy]) =>
    `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}"/>`
  ).join('');
  return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">${dots}</svg>`;
}

// ── State ──
let numDice = 1;
let values = [1, 1, 1];
let isRolling = false;
let isHolding = false;
let rollInterval = null;
let tapStopTimer = null;   // for 0.8s tap auto-stop
let popupTimer = null;
let pressStartTime = 0;
const HOLD_THRESHOLD = 180; // ms — below this = tap, above = hold

const stage = document.getElementById('stage');
const sumPopup = document.getElementById('sum-popup');
const sumValue = document.getElementById('sum-value');
const hint = document.getElementById('hint');
const toggle2 = document.getElementById('toggle2');
const toggle3 = document.getElementById('toggle3');

// ── Build dice ──
function buildDice() {
  // Kill any orphaned timers/intervals before nuking the DOM
  clearInterval(rollInterval); rollInterval = null;
  clearTimeout(tapStopTimer); tapStopTimer = null;
  isRolling = false; isHolding = false;

  stage.innerHTML = '';
  stage.className = numDice === 3 ? 'three-dice' : '';

  for (let i = 0; i < numDice; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'die-wrap';

    const die = document.createElement('div');
    die.className = 'die';
    die.id = `die-${i}`;

    const face = document.createElement('div');
    face.className = 'die-face';
    face.id = `face-${i}`;
    face.innerHTML = makeDotsSVG(values[i], values[i] === 1);

    const shadow = document.createElement('div');
    shadow.className = 'die-shadow';

    die.appendChild(face);
    wrap.appendChild(die);
    wrap.appendChild(shadow);
    stage.appendChild(wrap);
  }
}

function updateFace(i, n) {
  const face = document.getElementById(`face-${i}`);
  if (face) face.innerHTML = makeDotsSVG(n, n === 1);
}

// ── Toggle logic ──
function setNumDice(n) {
  // Fully abort any in-progress roll before changing dice count
  if (isRolling) {
    isRolling = false;
    isHolding = false;
    clearInterval(rollInterval);
    rollInterval = null;
    clearTimeout(tapStopTimer);
    tapStopTimer = null;
  }
  numDice = n;
  toggle2.classList.toggle('active', n >= 2);
  toggle3.classList.toggle('active', n >= 3);
  buildDice();
  hideSum();
  hint.textContent = 'Tap to roll';
}

toggle2.addEventListener('click', e => {
  e.stopPropagation();
  if (numDice === 1) setNumDice(2);
  else if (numDice === 2) setNumDice(1);
  else if (numDice === 3) setNumDice(2); // removing 3rd keeps 2nd
});

toggle3.addEventListener('click', e => {
  e.stopPropagation();
  if (numDice < 2) { setNumDice(3); return; } // jump to 3, enabling 2 implicitly
  if (numDice === 3) setNumDice(2);
  else setNumDice(3);
});

// ── Roll core ──
function rollOnce() {
  for (let i = 0; i < numDice; i++) {
    const v = Math.floor(Math.random() * 6) + 1;
    values[i] = v;
    updateFace(i, v);
  }
}

function startRolling() {
  isRolling = true;
  for (let i = 0; i < numDice; i++) {
    const die = document.getElementById(`die-${i}`);
    if (die) { die.classList.remove('settling'); die.classList.add('rolling'); }
  }
  rollInterval = setInterval(rollOnce, 100);
}

function stopRolling() {
  if (!isRolling) return;
  isRolling = false;

  clearInterval(rollInterval);
  rollInterval = null;
  clearTimeout(tapStopTimer);
  tapStopTimer = null;

  // Final definitive roll
  rollOnce();

  for (let i = 0; i < numDice; i++) {
    const die = document.getElementById(`die-${i}`);
    if (die) {
      die.classList.remove('rolling');
      void die.offsetWidth;
      die.classList.add('settling');
      die.addEventListener('animationend', () => die.classList.remove('settling'), { once: true });
    }
  }

  if (numDice >= 2) showSum([...values]);
  else hideSum();
  hint.textContent = 'Tap to roll again';
}

// ── Press handling ──
function onPressStart(e) {
  if (e.target.closest('.toggle-btn')) return;
  e.preventDefault();
  if (isRolling) return;   // ignore new press while roll is already in progress

  // Ripple
  const touch = e.touches ? e.touches[0] : e;
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  const size = 120;
  ripple.style.cssText = `width:${size}px;height:${size}px;left:${touch.clientX-size/2}px;top:${touch.clientY-size/2}px`;
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  pressStartTime = Date.now();
  isHolding = true;
  startRolling();

  // If the user taps (short press), auto-stop after 0.8s
  // If they keep holding, this timer keeps being pushed by onPressEnd
  tapStopTimer = setTimeout(() => {
    // Still holding after 0.8s → keep rolling (don't stop, cancel the auto-stop)
    tapStopTimer = null;
    // rolling continues freely until mouseup/touchend
  }, 800);
}

function onPressEnd(e) {
  if (!isHolding) return;
  isHolding = false;

  const held = Date.now() - pressStartTime;

  if (held < HOLD_THRESHOLD) {
    // TAP: let it roll for the remaining time to hit 0.8s total
    const remaining = 800 - held;
    clearTimeout(tapStopTimer);
    tapStopTimer = setTimeout(stopRolling, Math.max(remaining, 50));
  } else {
    // HOLD RELEASE: stop immediately
    clearTimeout(tapStopTimer);
    tapStopTimer = null;
    stopRolling();
  }
}

// ── Sum popup ──
function showSum(vals) {
  clearTimeout(popupTimer);
  const total = vals.slice(0, numDice).reduce((a, b) => a + b, 0);
  sumValue.textContent = total;
  sumPopup.classList.add('visible');
  popupTimer = setTimeout(hideSum, 3500);
}

function hideSum() {
  sumPopup.classList.remove('visible');
}

// ── Listeners ──
document.body.addEventListener('mousedown', onPressStart);
document.body.addEventListener('mouseup', onPressEnd);
document.body.addEventListener('mouseleave', e => { if (isHolding) onPressEnd(e); });
document.body.addEventListener('touchstart', onPressStart, { passive: false });
document.body.addEventListener('touchend', onPressEnd);
document.body.addEventListener('touchcancel', onPressEnd);
document.body.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('orientationchange', () => setTimeout(buildDice, 120));
window.addEventListener('resize', buildDice);

// ── Init ──
buildDice();
</script>
</body>
</html>
